#	Флаги для названий proxy
#     🇨🇿  Czech     🇳🇱  Netherlands   🇩🇪  Germany      🇫🇮  Finland     🇨🇭  Switzerland     🇺🇸  United States
#     🇪🇪  Estonia   🇩🇰  Denmark       🇱🇹  Lithuania    🇸🇪  Sweden      🇱🇺  Luxembourg		🇰🇿  Kazakhstan      🇧🇬  Bulgaria

#    Строчка в имени прокси _R добавляет эту прокси в резервный пулл "Reserve". Пример: - name: 'Второй конфиг - SS_R'
proxies:
- name: 'Первый конфиг - Vless'
  type: vless
  server: xxxxxxxxxx
  port: 443
  uuid: xxxxxxxxxx
  network: tcp
  udp: true
  flow: xtls-rprx-vision
  tls: true
  servername: xxxxxxxxxx
  reality-opts:
    public-key: xxxxxxxxxxxxxxxxxxxxxxxxxxxxxx
    short-id: xxxxxxxxxx
  client-fingerprint: chrome

- name: 'Второй конфиг - SS'
  type: "ss"
  server: xxxxxxxxxxxxxxx
  port: xxxx
  password: "xxxxxxxxxxxx"
  cipher: "aes-256-gcm"

- name: 'Третий конфиг - WG'
  type: wireguard
  private-key: xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx
  server: xxxxxxxxxxxxxx
  port: xxxxx
  ip: xxxxxxxxxx
  dns: ['8.8.8.8']
  public-key: xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx
  allowed-ips: ['0.0.0.0/0']
  udp: true
  persistent-keepalive: 25
